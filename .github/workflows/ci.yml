name: ci
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore CivicFlow.sln
      - name: Build
        run: dotnet build CivicFlow.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test CivicFlow.sln --configuration Release --no-build --logger trx
      - name: Static repository contract check
        run: python3 scripts/verify_static.py
