# Docker compose for the hosted demo at waofm-demo.madewellrd.com.
#
# Usage (from the repo root):
#   docker compose -f docker-compose.demo.yml up -d --build
#
# Required env vars (use a .env next to this file or set in the host shell):
#   ANTHROPIC_API_KEY            real model key; omit to keep Mock provider
#   AI_PROVIDER                  "Anthropic" or "Mock" (default: Mock)
#   AI_KILL_SWITCH_ENGAGED       "true" / "false" (default: false)
#   SQL_SA_PASSWORD              SQL Server sa password (default: see .env.example)
#   CIVICFLOW_PUBLIC_HOST        e.g. waofm-demo.madewellrd.com (for CORS)
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: civicflow-demo-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD:-CivicFlow!Passw0rd}"
      MSSQL_PID: "Developer"
    volumes:
      - civicflow-demo-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civicflow-demo-api
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CivicFlow: "Server=sqlserver,1433;Database=CivicFlow;User Id=sa;Password=${SQL_SA_PASSWORD:-CivicFlow!Passw0rd};TrustServerCertificate=True"
      Cors__AllowedOrigins__0: "https://${CIVICFLOW_PUBLIC_HOST:-waofm-demo.madewellrd.com}"
      Cors__AllowedOrigins__1: "http://localhost"
      Ai__Provider: "${AI_PROVIDER:-Mock}"
      Ai__KillSwitchEngaged: "${AI_KILL_SWITCH_ENGAGED:-false}"
      Ai__AnthropicApiKey: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8080/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: frontend/civicflow-web/Dockerfile
    container_name: civicflow-demo-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  civicflow-demo-sql-data:
