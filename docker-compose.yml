services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: civicflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CivicFlow!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - civicflow-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P CivicFlow!Passw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
volumes:
  civicflow-sql-data:
